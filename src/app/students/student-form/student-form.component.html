<div class="form-page">
  <div class="form-card">
    <h2>{{ isEdit ? 'Edit Student' : 'Add Student' }}</h2>

    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <!-- show spinner while fetching student for edit -->
    <div *ngIf="fetchingStudent" class="loading">Loading student data...</div>

    <form *ngIf="!fetchingStudent" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Name</label>
        <input [(ngModel)]="form.name" name="name" type="text"
               placeholder="Full name" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input [(ngModel)]="form.email" name="email" type="email"
               placeholder="email@example.com" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Age</label>
          <input [(ngModel)]="form.age" name="age" type="number"
                 min="1" max="100" required />
        </div>
        <div class="form-group">
          <label>Course</label>
          <input [(ngModel)]="form.course" name="course" type="text"
                 placeholder="e.g. Computer Science" required />
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Saving...' : isEdit ? 'Update' : 'Add Student' }}
        </button>
      </div>
    </form>
  </div>
</div>
